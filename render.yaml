services:
  - type: cron
    name: bullchain-linkedin-agent
    runtime: python
    schedule: "0 17 * * *"   # 17:00 UTC = 9:00 AM PST
    buildCommand: pip install -r requirements.txt
    startCommand: python poster.py
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: LINKEDIN_ACCESS_TOKEN
        sync: false
      - key: LINKEDIN_ORGANIZATION_ID
        sync: false
